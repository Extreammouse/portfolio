<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e63"/>
      <stop offset="100%" style="stop-color:#9c27b0"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5722"/>
      <stop offset="100%" style="stop-color:#e91e63"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="120" fill="#e91e63" opacity="0.07"/>
  <circle cx="100" cy="400" r="100" fill="#9c27b0" opacity="0.07"/>

  <!-- Back card (stacked) -->
  <rect x="280" y="60" width="240" height="340" rx="20" fill="url(#card2)" opacity="0.6" transform="rotate(6, 400, 230)" filter="url(#shadow)"/>

  <!-- Main profile card -->
  <rect x="270" y="50" width="260" height="360" rx="20" fill="url(#card1)" filter="url(#shadow)"/>

  <!-- Avatar circle -->
  <circle cx="400" cy="190" r="80" fill="white" opacity="0.15"/>
  <circle cx="400" cy="175" r="45" fill="white" opacity="0.3"/>
  <ellipse cx="400" cy="270" rx="65" ry="40" fill="white" opacity="0.2"/>

  <!-- Name text on card -->
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Alex, 24</text>
  <text x="400" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.75)">📍 2 miles away</text>

  <!-- Like / Dislike buttons -->
  <circle cx="320" cy="415" r="28" fill="#1a1a2e" stroke="#e91e63" stroke-width="2" opacity="0.9"/>
  <text x="320" y="423" text-anchor="middle" font-size="22">✕</text>

  <circle cx="400" cy="410" r="20" fill="#1a1a2e" stroke="#9c27b0" stroke-width="2" opacity="0.9"/>
  <text x="400" y="418" text-anchor="middle" font-size="15">⭐</text>

  <circle cx="480" cy="415" r="28" fill="#1a1a2e" stroke="#e91e63" stroke-width="2" opacity="0.9"/>
  <text x="480" y="423" text-anchor="middle" font-size="22">♥</text>

  <!-- Title and tags on the left -->
  <text x="60" y="130" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">Dating Game</text>
  <text x="60" y="160" font-family="Arial, sans-serif" font-size="14" fill="#e91e63">iOS &amp; Android Dating App</text>

  <!-- Feature pills -->
  <rect x="60" y="185" width="110" height="28" rx="14" fill="#e91e63" opacity="0.2" stroke="#e91e63" stroke-width="1"/>
  <text x="115" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e91e63">React Native</text>

  <rect x="180" y="185" width="90" height="28" rx="14" fill="#9c27b0" opacity="0.2" stroke="#9c27b0" stroke-width="1"/>
  <text x="225" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#9c27b0">Firebase</text>

  <rect x="60" y="223" width="80" height="28" rx="14" fill="#e91e63" opacity="0.2" stroke="#e91e63" stroke-width="1"/>
  <text x="100" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e91e63">Real-time</text>

  <rect x="150" y="223" width="70" height="28" rx="14" fill="#9c27b0" opacity="0.2" stroke="#9c27b0" stroke-width="1"/>
  <text x="185" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#9c27b0">Swipe UI</text>

  <!-- Match notification badge -->
  <rect x="590" y="150" width="155" height="60" rx="14" fill="#e91e63" opacity="0.15" stroke="#e91e63" stroke-width="1"/>
  <text x="667" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">🎉 It's a Match!</text>
  <text x="667" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.65)">Start chatting now</text>

  <!-- Chat bubble -->
  <rect x="585" y="240" width="170" height="45" rx="12" fill="white" opacity="0.08"/>
  <text x="670" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Hey! I saw you like hiking 🏔️</text>
  <text x="670" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">just now</text>

  <!-- Heart particles -->
  <text x="620" y="360" font-size="18" opacity="0.4" fill="#e91e63">♥</text>
  <text x="700" y="330" font-size="12" opacity="0.3" fill="#e91e63">♥</text>
  <text x="650" y="400" font-size="10" opacity="0.2" fill="#9c27b0">♥</text>
  <text x="140" y="300" font-size="14" opacity="0.2" fill="#e91e63">♥</text>
  <text x="180" y="350" font-size="10" opacity="0.15" fill="#9c27b0">♥</text>
</svg>
